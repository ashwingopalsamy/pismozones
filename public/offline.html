<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pismo Zones — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
      background: #0f0f11;
      color: #fff;
      padding: 2rem;
      text-align: center;
    }
    .offline-card {
      max-width: 320px;
      padding: 2rem;
      border-radius: 20px;
      background: rgba(28,28,30,0.8);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .offline-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 1rem;
      border-radius: 12px;
      background: linear-gradient(135deg, #4A90D9, #F5A623);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .offline-icon svg { width: 28px; height: 28px; }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { font-size: 0.85rem; opacity: 0.5; line-height: 1.5; }
    .retry {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 10px 24px;
      border-radius: 50px;
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.3);
      color: #60a5fa;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="offline-icon">
      <svg viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="14" stroke="white" stroke-width="2"/>
        <ellipse cx="16" cy="16" rx="6" ry="14" stroke="white" stroke-width="1.5" opacity="0.6"/>
        <line x1="2" y1="16" x2="30" y2="16" stroke="white" stroke-width="1.5" opacity="0.6"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Times will sync when you reconnect.</p>
    <a href="/" class="retry" onclick="window.location.reload(); return false;">Try again</a>
  </div>
</body>
</html>
